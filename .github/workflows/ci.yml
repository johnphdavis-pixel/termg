name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  lint-and-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install GTK / VTE bindings and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-gi gir1.2-gtk-3.0 gir1.2-vte-2.91 xvfb
          python -m pip install --upgrade pip
          pip install pyflakes

      - name: Byte-compile
        run: python -m py_compile termg.py

      - name: Lint (pyflakes)
        run: python -m pyflakes termg.py

      - name: Import smoke test (headless)
        run: xvfb-run -a python -c "import termg; print('import OK')"
